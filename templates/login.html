<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RepoGen</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(45deg, white, white, #2563eb, white);
      overflow: hidden;
    }

    /* Background watermark */
    .clicknock-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 300px;
      font-weight: bold;
      color: black;
      opacity: 0.07;
      z-index: -1;
    }

    /* Logo */
    .logo img {
      position: absolute;
      top: 10px;
      left: 10px;
      height: 8vh;
    }

    /* Register button */
    .Reg {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #4CAF50;
      padding: 12px 16px;
      border-radius: 5px;
      box-shadow: 5px 5px 10px black;
    }

    .Reg a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    /* Login card */
    .login-container {
      width: 300px;
      height: 320px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(6px);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      animation: fadeIn 1s ease-in-out;
    }

    h2 {
      color: white;
      margin-bottom: 5px;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 15px 0;
      font-size: 16px;
      border-radius: 5px;
      border: 2px solid #ddd;
      box-shadow: 2px 2px 10px black;
      transition: 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #4CAF50;
      transform: translateY(-3px);
    }

    .btn-login {
      width: 70%;
      padding: 12px;
      background: #4CAF50;
      border: none;
      color: white;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 2px 2px 10px black;
      transition: 0.3s;
    }

    .btn-login:hover {
      background: #45a049;
      transform: translateY(-2px);
    }

    .forgot-password {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="clicknock-text">RepoGen</div>

  <!-- Logo (optional) -->
  <div class="logo">
    <img src="/assets/logo.png" alt="RepoGen Logo">
  </div>

  <div class="Reg">
    <a href="/register">Register >></a>
  </div>

  <div class="login-container">
    <h2>Login</h2>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div
      style="background: {% if category == 'error' %}#ff4444{% elif category == 'success' %}#4CAF50{% else %}#2196F3{% endif %}; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px;">
      {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
      <input type="text" name="username" id="username" placeholder="Email or Phone Number" required>
      <input type="password" name="password" id="password" placeholder="Password" required>
      <button type="submit" class="btn-login">Log In</button>
    </form>

    <a href="#" class="forgot-password">Forgot Password?</a>

    <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
      <a href="/admin/login"
        style="padding: 8px 12px; background: #764ba2; color: white; text-decoration: none; border-radius: 5px; font-size: 13px; transition: 0.3s;">Admin
        Login</a>
      <a href="/admin/register"
        style="padding: 8px 12px; background: #764ba2; color: white; text-decoration: none; border-radius: 5px; font-size: 13px; transition: 0.3s;">Admin
        Register</a>
    </div>
  </div>

</body>

</html>
