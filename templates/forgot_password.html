<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | RepoGen</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, white, white, #2563eb, white);
            overflow: hidden;
        }

        .clicknock-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 300px;
            font-weight: bold;
            color: black;
            opacity: 0.07;
            z-index: -1;
            user-select: none;
        }

        .logo img {
            position: absolute;
            top: 10px;
            left: 10px;
            height: 8vh;
        }

        /* Back to login badge */
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #764ba2;
            padding: 12px 16px;
            border-radius: 5px;
            box-shadow: 5px 5px 10px black;
        }

        .back-btn a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .card {
            width: 360px;
            padding: 36px 32px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        h2 {
            color: white;
            margin: 0 0 6px 0;
            font-size: 24px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            margin-bottom: 18px;
        }

        .flash {
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 14px;
            font-size: 13px;
            color: white;
            text-align: left;
        }

        .flash.error {
            background: #ff4444;
        }

        .flash.success {
            background: #4CAF50;
        }

        .flash.info {
            background: #2196F3;
        }

        .field-row {
            display: flex;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            margin: 8px 0;
            font-size: 15px;
            border-radius: 6px;
            border: 2px solid #ddd;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #4CAF50;
            transform: translateY(-2px);
        }

        .btn-submit {
            width: 75%;
            margin-top: 14px;
            padding: 13px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 2px 2px 10px black;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Step indicator */
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .step {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            border: 2px solid white;
        }

        .step.active {
            background: white;
            color: #2563eb;
        }

        .step.inactive {
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .step-line {
            width: 40px;
            border-top: 2px dashed rgba(255, 255, 255, 0.35);
            align-self: center;
        }
    </style>
</head>

<body>
    <div class="clicknock-text">RepoGen</div>

    <div class="logo">
        <img src="/assets/logo.png" alt="RepoGen Logo">
    </div>

    <div class="back-btn">
        <a href="/login">&larr; Back to Login</a>
    </div>

    <div class="card">
        <h2>Forgot Password</h2>
        <p class="subtitle">Enter your registered details to verify your identity</p>

        <!-- Step indicator -->
        <div class="step-indicator">
            <div class="step active">1</div>
            <div class="step-line"></div>
            <div class="step inactive">2</div>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/forgot_password">
            <div class="field-row">
                <input type="text" name="first_name" id="first_name" placeholder="First Name" required>
                <input type="text" name="last_name" id="last_name" placeholder="Last Name" required>
            </div>
            <input type="email" name="email" id="email" placeholder="Registered Email" required>
            <input type="tel" name="phone" id="phone" placeholder="Registered Phone Number" required>
            <br>
            <button type="submit" class="btn-submit">Verify Identity &rarr;</button>
        </form>
    </div>
</body>

</html>
