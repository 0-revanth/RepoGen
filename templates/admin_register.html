<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Register | RepoGen</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, white, white, #764ba2, white);
            overflow: hidden;
        }

        .clicknock-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 300px;
            font-weight: bold;
            color: black;
            opacity: 0.07;
            z-index: -1;
        }

        .logo img {
            position: absolute;
            height: 8vh;
            top: 10px;
            left: 10px;
        }

        .login {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px;
            background-color: #764ba2;
            box-shadow: 8px 5px 10px black;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
        }

        .login a {
            text-decoration: none;
            color: white;
        }

        .Reg-container {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            padding: 30px;
            width: 340px;
            text-align: center;
            backdrop-filter: blur(6px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1s ease-in-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        h2 {
            color: white;
            margin-bottom: 10px;
        }

        .admin-badge {
            background: #764ba2;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #764ba2;
            outline: none;
            transform: translateY(-3px);
        }

        .name {
            display: flex;
            justify-content: space-evenly;
        }

        .name input {
            width: 32%;
        }

        label {
            color: white;
            font-weight: 500;
        }

        .gender {
            margin: 10px 0;
        }

        input[type="radio"] {
            accent-color: #764ba2;
            width: 16px;
            height: 16px;
            margin-left: 5px;
            margin-right: 15px;
        }

        .btn-Reg {
            width: 70%;
            padding: 12px;
            background-color: #764ba2;
            border: none;
            color: white;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .btn-Reg:hover {
            background-color: #5a3778;
            transform: translateY(-2px);
        }

        .divider {
            margin: 15px 0 10px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .user-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .btn-user {
            padding: 8px 12px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 5px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-user:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="clicknock-text">RepoGen</div>


    <div class="logo"><img src="/assets/logo.png" alt="Logo"></div>

    <div class="login">
        <a href="/admin/login">Admin Login >></a>
    </div>

    <div class="Reg-container">
        <h2>Admin Register</h2>
        <span class="admin-badge">👑 ADMINISTRATOR</span>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div
            style="background: {% if category == 'error' %}#ff4444{% elif category == 'success' %}#4CAF50{% else %}#2196F3{% endif %}; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px;">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/admin/register">

            <div class="name">
                <input type="text" name="first_name" id="first_name" placeholder="First name" required>
                <input type="text" name="last_name" id="last_name" placeholder="Last name" required>
            </div>

            <input type="text" name="organization_name" id="organization_name" placeholder="Organization Name" required>

            <div style="text-align: left; width: 80%; margin: 10px auto;">
                <label
                    style="font-size: 12px; color: rgba(255,255,255,0.8); margin-bottom: 5px; display: block;">Organization
                    Code Prefix (3 Letters)</label>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="text" name="org_prefix" id="org_prefix" placeholder="ABC"
                        style="width: 100%; margin: 0; text-transform: uppercase;" maxlength="3"
                        title="First 3 letters of your organization code" required>
                    <div style="color: white; font-weight: bold;">- XXXXX</div>
                </div>
            </div>

            <input type="email" name="email" id="email" placeholder="Email" required>
            <input type="text" name="phone" id="phone" placeholder="Phone Number" pattern="[0-9]{10}" required>

            <div class="gender">
                <label>Male</label><input type="radio" name="gender" value="Male" required>
                <label>Female</label><input type="radio" name="gender" value="Female" required>
                <label>Others</label><input type="radio" name="gender" value="Others" required>
            </div>

            <input type="password" name="password" id="password" placeholder="Enter Password"
                pattern="(?=.*\d)(?=.*[a-zA-Z]).{8,}"
                title="Password must be at least 8 characters and contain a number" required>
            <input type="password" name="repassword" id="repassword" placeholder="Re-Enter Password" required>

            <button type="submit" class="btn-Reg">Register as Admin</button>
        </form>

        <div class="divider">— or —</div>

        <div class="user-buttons">
            <a href="/login" class="btn-user">User Login</a>
            <a href="/register" class="btn-user">User Register</a>
        </div>
    </div>

    <script>
        // Client-side password match validation
        document.querySelector("form").addEventListener("submit", function (e) {
            const password = document.getElementById("password").value;
            const repassword = document.getElementById("repassword").value;

            if (password !== repassword) {
                e.preventDefault();
                alert("Passwords do not match");
            }
        });
    </script>

</body>

</html>
