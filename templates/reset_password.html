<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | RepoGen</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, white, white, #2563eb, white);
            overflow: hidden;
        }

        .clicknock-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 300px;
            font-weight: bold;
            color: black;
            opacity: 0.07;
            z-index: -1;
            user-select: none;
        }

        .logo img {
            position: absolute;
            top: 10px;
            left: 10px;
            height: 8vh;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #764ba2;
            padding: 12px 16px;
            border-radius: 5px;
            box-shadow: 5px 5px 10px black;
        }

        .back-btn a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .card {
            width: 340px;
            padding: 36px 32px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        h2 {
            color: white;
            margin: 0 0 6px 0;
            font-size: 24px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            margin-bottom: 18px;
        }

        .flash {
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 14px;
            font-size: 13px;
            color: white;
            text-align: left;
        }

        .flash.error {
            background: #ff4444;
        }

        .flash.success {
            background: #4CAF50;
        }

        .flash.info {
            background: #2196F3;
        }

        .password-wrapper {
            position: relative;
        }

        input[type="password"] {
            width: 100%;
            padding: 11px 42px 11px 14px;
            margin: 8px 0;
            font-size: 15px;
            border-radius: 6px;
            border: 2px solid #ddd;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #4CAF50;
            transform: translateY(-2px);
        }

        .toggle-eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            user-select: none;
            color: #555;
        }

        /* password strength bar */
        .strength-bar {
            height: 5px;
            border-radius: 3px;
            margin: 2px 0 10px 0;
            background: #ddd;
            overflow: hidden;
        }

        .strength-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 3px;
            transition: width 0.3s, background 0.3s;
        }

        .btn-submit {
            width: 75%;
            margin-top: 14px;
            padding: 13px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 2px 2px 10px black;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Step indicator */
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .step {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            border: 2px solid white;
        }

        .step.done {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .step.active {
            background: white;
            color: #2563eb;
        }

        .step-line {
            width: 40px;
            border-top: 2px dashed rgba(255, 255, 255, 0.35);
            align-self: center;
        }
    </style>
</head>

<body>
    <div class="clicknock-text">RepoGen</div>

    <div class="logo">
        <img src="/assets/logo.png" alt="RepoGen Logo">
    </div>

    <div class="back-btn">
        <a href="/login">&larr; Back to Login</a>
    </div>

    <div class="card">
        <h2>Reset Password</h2>
        <p class="subtitle">Choose a strong new password (min. 8 characters)</p>

        <!-- Step indicator -->
        <div class="step-indicator">
            <div class="step done">✓</div>
            <div class="step-line"></div>
            <div class="step active">2</div>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/reset_password" id="resetForm">
            <div class="password-wrapper">
                <input type="password" name="new_password" id="new_password" placeholder="New Password" required
                    minlength="8" oninput="checkStrength(this.value)">
                <span class="toggle-eye" onclick="toggleVisibility('new_password', this)">👁️</span>
            </div>
            <div class="strength-bar">
                <div class="strength-bar-fill" id="strengthFill"></div>
            </div>

            <div class="password-wrapper">
                <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm New Password"
                    required>
                <span class="toggle-eye" onclick="toggleVisibility('confirm_password', this)">👁️</span>
            </div>

            <button type="submit" class="btn-submit">Set New Password</button>
        </form>
    </div>

    <script>
        function toggleVisibility(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }

        function checkStrength(val) {
            const fill = document.getElementById('strengthFill');
            let score = 0;
            if (val.length >= 8) score++;
            if (val.length >= 12) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const pct = (score / 5) * 100;
            const color = score <= 1 ? '#ff4444' : score <= 3 ? '#ff9800' : '#4CAF50';
            fill.style.width = pct + '%';
            fill.style.background = color;
        }

        // Client-side match check before submit
        document.getElementById('resetForm').addEventListener('submit', function (e) {
            const p1 = document.getElementById('new_password').value;
            const p2 = document.getElementById('confirm_password').value;
            if (p1 !== p2) {
                e.preventDefault();
                alert('Passwords do not match!');
            }
        });
    </script>
</body>

</html>
